{{ define "head" }}
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="{{ .description }}">
{{ if .ogTitle }}
    <meta property="og:title" content="{{ .ogTitle }}">
    <meta property="og:description" content="{{ .description }}">
    <meta property="og:type" content="{{ if .ogType }}{{ .ogType }}{{ else }}website{{ end }}">
{{ end }}
    <title>{{ .siteName }}</title>
    <link rel="icon" type="image/png" href="{{ .icone }}">
    <link rel="alternate" type="application/rss+xml" title="{{.siteName}}" href="/rss.xml" />
{{ .rsslink }}
    <script>
        (function(){var m=document.cookie.match(/(?:^|;\s*)darkMode=([^;]*)/);if(m&&m[1]==='1'){document.documentElement.classList.add('dark-mode-init');}})();
    </script>
    <style>.dark-mode-init body,.dark-mode-init{background-color:#121212;color:#e0e0e0;}</style>
    <script defer src="/files/js/alpine.3.15.5.min.js"></script>
{{ end }}
